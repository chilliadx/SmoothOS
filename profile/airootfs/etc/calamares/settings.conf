---
modules-search: [ local ]

instances:
- id:       default
  module:   welcome
  config:   welcome.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - initcramfs
      - grubcfg
      - bootloader
      - umount
  - show:
      - finished

branding: default
prompt-at-end: false
